name: CI

on:
  push:
    branches: [master, main, "feat/**", "fix/**"]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Backend Tests (440+ required)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: uv sync --extra dev

      - name: Create data directory
        run: mkdir -p backend/data/audio backend/data/html_reports

      - name: Run tests (and verify count ≥ 440)
        working-directory: backend
        env:
          # Mock FSS path — CI runs without FSS installed
          CANGJIE_PITCH_COACH_ROOT: /tmp/mock_pitch_coach
          CANGJIE_DRY_RUN: "true"
        run: |
          set -o pipefail   # 保留 pytest 真实失败（tee 会掩盖退出码）
          mkdir -p /tmp/mock_pitch_coach/src
          # 只跑一次；输出同时落盘供计数（旧版跑两遍 + 脆弱 grep 在 set -e 下误杀）
          uv run --extra dev pytest tests/ --ignore=tests/test_doctor_script.py -q --tb=short \
            | tee /tmp/pytest_out.txt
          COUNT=$(grep -oE '[0-9]+ passed' /tmp/pytest_out.txt | grep -oE '[0-9]+' | head -1 || true)
          echo "Tests passed: ${COUNT:-0}"
          if [ "${COUNT:-0}" -lt 440 ]; then
            echo "❌ 测试数量不足 440，请检查是否有测试被跳过或删除"
            exit 1
          fi

  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (TypeScript check included)
        working-directory: frontend
        run: npm run build
