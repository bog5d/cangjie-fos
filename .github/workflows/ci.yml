name: CI

on:
  push:
    branches: [master, main, "feat/**", "fix/**"]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Backend Tests (440+ required)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: uv sync --extra dev

      - name: Create data directory
        run: mkdir -p backend/data/audio backend/data/html_reports

      - name: Run tests (and verify count ≥ 440)
        working-directory: backend
        env:
          # Mock FSS path — CI runs without FSS installed
          CANGJIE_PITCH_COACH_ROOT: /tmp/mock_pitch_coach
          CANGJIE_DRY_RUN: "true"
        run: |
          mkdir -p /tmp/mock_pitch_coach/src
          # 只跑一次。pytest 退出码直接决定步骤成败（有失败即非0 → 本步失败）。
          # 计数从 JUnit XML（机器可读）解析，不依赖人类摘要行——
          # 旧写法靠 grep 摘要行，在本 pytest/uv 组合下摘要行抓不到，每次推送必误判失败。
          uv run --extra dev pytest tests/ --ignore=tests/test_doctor_script.py \
            -q --tb=short --junit-xml=/tmp/result.xml
          COUNT=$(python3 -c "import xml.etree.ElementTree as ET; r=ET.parse('/tmp/result.xml').getroot(); s=r if r.tag=='testsuite' else r.find('testsuite'); t=int(s.get('tests',0)); f=int(s.get('failures',0)); e=int(s.get('errors',0)); k=int(s.get('skipped',0)); print(t-f-e-k)")
          echo "Tests passed: $COUNT"
          if [ "$COUNT" -lt 440 ]; then
            echo "❌ 测试数量不足 440，请检查是否有测试被跳过或删除"
            exit 1
          fi

  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (TypeScript check included)
        working-directory: frontend
        run: npm run build
